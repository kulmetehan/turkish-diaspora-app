name: News Aggregator Cron Job

on:
  schedule:
    - cron: '*/15 * * * *'     # elke 15 min
  workflow_dispatch: {}

jobs:
  ingest:
    if: github.ref == 'refs/heads/main'   # alleen op main
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: news-ingest
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r api/requirements.txt
      - name: Run ingestion (writes to Supabase)
        run: python -m ingest.news_ingestion_system
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}   # verplicht voor inserts
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}                   # optioneel
