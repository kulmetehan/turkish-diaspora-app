name: News Aggregator Cron Job

on:
  schedule:
    - cron: "*/15 * * * *"   # elke 15 min (UTC)
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  run_script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false      # voorkom td-pages submodule-gedoe
          clean: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            api/requirements.txt

      - name: Install dependencies (api/requirements.txt)
        run: |
          set -e
          python -m pip install --upgrade pip
          if [ -f "api/requirements.txt" ]; then
            pip install -r api/requirements.txt
          else
            echo "::error file=api/requirements.txt::api/requirements.txt niet gevonden. Is dit bestand wel gecommit?"
            exit 1
          fi

      - name: Run aggregator
        env:
          PYTHONPATH: ${{ github.workspace }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # DATABASE_URL: ${{ secrets.DATABASE_URL }}   # voeg toe als je DB gebruikt
          # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}  # indien nodig
        run: |
          set -e
          python ingest/google_news_aggregator.py
